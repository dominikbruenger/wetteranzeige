<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=960, height=532, initial-scale=1.0">
<title>ÖFFIS Wetter</title>

<style>
  body {
    margin: 0;
    width: 960px;
    height: 532px;
    overflow: hidden;
    background: #1A0A6A; /* VIOLETT */
    color: #ffffff;
    font-family: Arial, sans-serif;
    position: relative;
  }

  /* HEADER */
  .topbar {
    text-align: center;
    padding-top: 16px;
    font-size: 24px;
    letter-spacing: 2px;
    font-weight: bold;
  }

  .accent {
    color: #F200A1;
  }

  /* CURRENT */
  .current {
    text-align: center;
    margin-top: 10px;
  }

  .icon {
    font-size: 72px;
  }

  .temp {
    font-size: 92px;
    font-weight: bold;
  }

  .desc {
    font-size: 26px;
    opacity: 0.95;
  }

  /* FORECAST */
  .forecast {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-top: 22px;
  }

  .card {
    background: #F200A1; /* MAGENTA */
    border-radius: 16px;
    padding: 18px;
    width: 210px;
    text-align: center;
  }

  .day {
    font-size: 18px;
    font-weight: bold;
    margin-bottom: 6px;
  }

  .card .icon {
    font-size: 44px;
    margin: 6px 0;
  }

  /* WICHTIG: Temperaturen größer */
  .card .temp {
    font-size: 40px;
    font-weight: bold;
  }

  /* FOOTER */
  .footer {
    position: absolute;
    bottom: 10px;
    width: 100%;
    text-align: center;
    font-size: 13px;
    opacity: 0.7;
  }
</style>
</head>

<body>

<div class="topbar">
  <span class="accent">ÖFFIS</span> • WETTER
</div>

<div class="current">
  <div class="icon" id="currentIcon">⏳</div>
  <div class="temp" id="currentTemp">--°</div>
  <div class="desc">Aktuelles Wetter in der Region</div>
</div>

<div class="forecast" id="forecast"></div>

<div class="footer">Hameln-Pyrmont • Live Wetterdaten</div>

<script>
const LAT = 52.103;
const LON = 9.356;

function getIcon(code) {
  if (code === 0) return "☀️";
  if (code <= 3) return "🌤️";
  if (code <= 48) return "🌫️";
  if (code <= 67) return "🌧️";
  if (code <= 77) return "❄️";
  if (code <= 82) return "🌦️";
  return "☁️";
}

function dayName(i) {
  return ["Heute", "Morgen", "Übermorgen"][i] || "";
}

async function loadWeather() {
  try {
    const url =
      `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}` +
      `&current_weather=true&daily=weathercode,temperature_2m_max` +
      `&forecast_days=3&timezone=auto`;

    const res = await fetch(url);
    const data = await res.json();

    // CURRENT
    const current = data.current_weather;

    document.getElementById("currentTemp").innerText =
      Math.round(current.temperature) + "°C";

    document.getElementById("currentIcon").innerText =
      getIcon(current.weathercode);

    // FORECAST
    const forecastEl = document.getElementById("forecast");
    forecastEl.innerHTML = "";

    for (let i = 0; i < 3; i++) {
      const code = data.daily.weathercode[i];
      const temp = data.daily.temperature_2m_max[i];

      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <div class="day">${dayName(i)}</div>
        <div class="icon">${getIcon(code)}</div>
        <div class="temp">${Math.round(temp)}°C</div>
      `;

      forecastEl.appendChild(card);
    }

  } catch (e) {
    document.querySelector(".desc").innerText =
      "Fehler beim Laden der Wetterdaten";
  }
}

loadWeather();
setInterval(loadWeather, 600000);
</script>

</body>
</html>

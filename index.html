<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920,height=532">

<title>ÖFFIS Wetter</title>

<style>

body {
    margin:0;
    width:1920px;
    height:532px;
    overflow:hidden;
    background:#1A0A6A;
    color:white;
    font-family:Arial,sans-serif;
}

.container {
    position:relative;
    width:1920px;
    height:532px;
}


/* HEADER */

.header {
    position:absolute;
    top:35px;
    width:100%;
    text-align:center;
    font-size:34px;
    font-weight:bold;
    letter-spacing:3px;
}

.accent {
    color:#F200A1;
}


/* AKTUELLES WETTER */

.current {
    position:absolute;
    top:95px;
    width:100%;
    height:230px;
    text-align:center;
}


.current-icon svg {
    width:125px;
    height:125px;
}


.current-temp {
    font-size:120px;
    font-weight:bold;
    line-height:110px;
}


.current-text {
    margin-top:8px;
    font-size:30px;
}


/* TAGESVORSCHAU */

.forecast {
    position:absolute;
    bottom:-45px;
    width:100%;
    display:flex;
    justify-content:center;
    gap:55px;
}


.card {

    width:330px;
    height:170px;

    background:#F200A1;

    border-radius:25px;

    text-align:center;

    padding-top:15px;

}


.day {

    font-size:28px;
    font-weight:bold;

}


.card svg {

    width:65px;
    height:65px;
    margin:5px;

}


.card-temp {

    font-size:52px;
    font-weight:bold;

}


/* FOOTER */

.footer {

    position:absolute;
    bottom:8px;
    width:100%;
    text-align:center;
    font-size:16px;
    opacity:.7;

}

</style>

</head>


<body>

<div class="container">


<div class="header">
<span class="accent">ÖFFIS</span> • WETTER
</div>



<div class="current">

<div class="current-icon" id="currentIcon">
☀
</div>

<div class="current-temp" id="currentTemp">
--°C
</div>

<div class="current-text">
Aktuelles Wetter in der Region
</div>

</div>



<div class="forecast" id="forecast"></div>



<div class="footer">
Hameln-Pyrmont • Live Wetterdaten
</div>


</div>



<script>


const icons = {

sun:`
<svg viewBox="0 0 100 100">
<circle cx="50" cy="50" r="22" fill="#FFD83D"/>
<g stroke="#FFD83D" stroke-width="6">
<line x1="50" y1="5" x2="50" y2="25"/>
<line x1="50" y1="75" x2="50" y2="95"/>
<line x1="5" y1="50" x2="25" y2="50"/>
<line x1="75" y1="50" x2="95" y2="50"/>
</g>
</svg>`,

cloudSun:`
<svg viewBox="0 0 100 100">
<circle cx="35" cy="35" r="18" fill="#FFD83D"/>
<path d="M25 75h45c15 0 15-25 0-25-5-20-35-15-35 5-15 0-18 20-10 20"
fill="white"/>
</svg>`,

cloud:`
<svg viewBox="0 0 100 100">
<path d="M25 75h45c15 0 15-25 0-25-5-20-35-15-35 5-15 0-18 20-10 20"
fill="white"/>
</svg>`,

rain:`
<svg viewBox="0 0 100 100">
<path d="M25 60h45c15 0 15-25 0-25-5-20-35-15-35 5-15 0-18 20-10 20"
fill="white"/>
<line x1="35" y1="70" x2="30" y2="90" stroke="#70d9ff" stroke-width="6"/>
<line x1="55" y1="70" x2="50" y2="90" stroke="#70d9ff" stroke-width="6"/>
<line x1="75" y1="70" x2="70" y2="90" stroke="#70d9ff" stroke-width="6"/>
</svg>`,

snow:`
<svg viewBox="0 0 100 100">
<path d="M25 60h45c15 0 15-25 0-25-5-20-35-15-35 5-15 0-18 20-10 20"
fill="white"/>
</svg>`

};



function getIcon(code){

if(code===0)
return icons.sun;

if(code<=3)
return icons.cloudSun;

if(code<=48)
return icons.cloud;

if(code<=67)
return icons.rain;

if(code<=77)
return icons.snow;

return icons.rain;

}



function dayName(i){

return [
"Heute",
"Morgen",
"Übermorgen"
][i];

}



async function loadWeather(){


try{


const res = await fetch("wetter.json?"+Date.now());

const data = await res.json();



document.getElementById("currentTemp").innerHTML =
Math.round(data.current.temperature)+"°C";


document.getElementById("currentIcon").innerHTML =
getIcon(data.current.weathercode);



const box=document.getElementById("forecast");

box.innerHTML="";



data.days.forEach((day,i)=>{


let card=document.createElement("div");

card.className="card";


card.innerHTML=`

<div class="day">
${dayName(i)}
</div>

${getIcon(day.weathercode)}

<div class="card-temp">
${Math.round(day.temperature)}°C
</div>

`;


box.appendChild(card);


});


}

catch(e){

document.querySelector(".current-text").innerHTML =
"Wetterdaten nicht verfügbar";

}

}



loadWeather();


</script>


</body>
</html>
